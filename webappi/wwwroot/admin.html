<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <div>
                <h1>Admin Management</h1>
                <p style="color: var(--text-muted);">Create admins and assign module rights</p>
            </div>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </header>

        <main>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3>All Administrators</h3>
                    <button id="openCreateUserBtn" class="btn">+ New User</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Create User Modal -->
    <div id="createUserModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Create New Admin</h2>
            <form id="createUserForm">
                <div>
                    <label>Full Name</label>
                    <input type="text" name="fullName" required>
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
                    <button type="button" class="btn btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn">Create User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Rights Modal -->
    <div id="rightsModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 0.5rem;">Manage Module Rights</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Select modules accessible to this user.</p>
            <form id="rightsForm">
                <div id="moduleList" class="checkbox-group">
                    <!-- Checkboxes populated by JS -->
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
                    <button type="button" class="btn btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
